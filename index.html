<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MARMARA GAMES // NEURAL PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2fe; --glitch: #ff00ff; --dark: #050505; }
        body { background: var(--dark); color: #fff; font-family: 'Share Tech Mono', monospace; margin: 0; overflow-x: hidden; }
        
        /* 1. SİBERPUNK GLASS GLITCH EFEKTİ */
        .glass-panel { background: rgba(10, 10, 10, 0.9); border: 1px solid var(--neon); backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(0,242,254,0.2); }
        
        /* 2. SCANLINE EFEKTİ */
        body::before { content: " "; position: fixed; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 9999; }

        .terminal { height: 600px; display: flex; flex-direction: column; padding: 20px; }
        .glitch-text { animation: glitch 1s linear infinite; }
        @keyframes glitch { 0% { text-shadow: 2px 0 var(--glitch); } 50% { text-shadow: -2px 0 var(--neon); } 100% { text-shadow: 2px 0 var(--glitch); } }
    </style>
</head>
<body>

<div id="system-status" class="glass-panel" style="position:fixed; top:10px; right:10px; padding:10px; font-size:0.7rem;">
    CORE: ONLINE | NETWORK: SECURE | SIGNAL: 98%

        <input type="text" id="msgInput" placeholder="SİSTEM KOMUTU GİR..." style="flex:1; background:transparent; border:1px solid var(--neon); color:#fff; padding:10px;">
        <button id="btn-send" class="btn">EXECUTE</button>
    </div>
</div>

    document.getElementById('btn-voice').onclick = () => recognition.start();
    recognition.onresult = (e) => {
        document.getElementById('msgInput').value = e.results[0][0].transcript;
    };

        let i = 0;

            element.innerHTML += text.charAt(i);
            i++;
            if(i >= text.length) clearInterval(timer);
        }, 30);
    };

        const div = document.createElement('div');
        div.style.color = 'var(--neon)';
        div.innerHTML = `> [SYS]: ${msg}`;
        document.getElementById('chat-box').appendChild(div);
    };

</script>

</body>
</html>
