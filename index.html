<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marmara Games | Official Portal</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAFtCQjGACAmoOSEIazC648I1BaLPkT8-U",
            authDomain: "share-your-thoughts-e15a7.firebaseapp.com",
            databaseURL: "https://share-your-thoughts-e15a7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "share-your-thoughts-e15a7",
            storageBucket: "share-your-thoughts-e15a7.firebasestorage.app",
            messagingSenderId: "137665399298",
            appId: "1:137665399298:web:60e7087fc41db2670f751b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.login = () => signInWithPopup(auth, provider).catch(e => alert("Giriş hatası: " + e.message));
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const authBtn = document.getElementById('auth-btn');
            if (user) {
                authBtn.innerText = "ÇIKIŞ YAP";
                authBtn.onclick = logout;
                document.getElementById('chat-input-zone').style.display = 'block';
            } else {
                authBtn.innerText = "GİRİŞ YAP";
                authBtn.onclick = login;
                document.getElementById('chat-input-zone').style.display = 'none';
            }
        });
    </script>
    <style>
        body { background: #0a0a0a; color: #eee; font-family: sans-serif; margin: 0; }
        nav { display: flex; gap: 20px; padding: 20px; border-bottom: 1px solid #333; background: #000; }
        .btn { background: #111; color: #fff; border: 1px solid #444; padding: 10px 20px; cursor: pointer; transition: 0.3s; }
        .btn:hover { border-color: #FFD700; color: #FFD700; }
        .section { padding: 50px; display: none; }
        .active { display: block; }
        #chat-box { height: 300px; background: #000; border: 1px solid #333; padding: 15px; overflow-y: auto; margin-bottom: 10px; }
    </style>
</head>
<body>

<nav>
    <button class="btn" onclick="show('home')">ANA SAYFA</button>
    <button class="btn" onclick="show('video')">SUNUM</button>
    <button class="btn" onclick="show('chat')">TOPLULUK</button>
    <button id="auth-btn" class="btn" style="margin-left:auto;">GİRİŞ YAP</button>
</nav>

<div id="home" class="section active">
    <h1>MARMARA GAMES™</h1>
    <p>Geleceği Birlikte Tasarlayalım.</p>
</div>

<div id="video" class="section">
    <video width="600" controls><source src="LICENSE.mp4" type="video/mp4"></video>
</div>

<div id="chat" class="section">
    <div id="chat-box"></div>
    <div id="chat-input-zone" style="display:none;">
        <input type="text" id="msg" placeholder="Mesajınız..." style="padding:10px; width:70%;">
        <button class="btn" onclick="sendMessage()">GÖNDER</button>
    </div>
</div>

<script>
    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function sendMessage() {
        let input = document.getElementById('msg');
        let div = document.createElement('div');
        div.innerText = "Kullanıcı: " + input.value;
        document.getElementById('chat-box').appendChild(div);
        input.value = "";
    }
</script>
</body>
</html>
