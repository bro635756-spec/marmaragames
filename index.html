<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Marmara Games | Portal</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAFtCQjGACAmoOSEIazC648I1BaLPkT8-U",
            authDomain: "share-your-thoughts-e15a7.firebaseapp.com",
            projectId: "share-your-thoughts-e15a7",
            storageBucket: "share-your-thoughts-e15a7.firebasestorage.app",
            messagingSenderId: "137665399298",
            appId: "1:137665399298:web:60e7087fc41db2670f751b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Giriş Yapma
        window.googleLogin = () => signInWithPopup(auth, provider);

        // Durum Kontrolü
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('video-section').style.display = 'block';
            }
        });
    </script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; text-align: center; }
        .hero { padding: 100px; }
        #video-section { display: none; margin-top: 50px; }
        .btn { padding: 15px 30px; background: #FFD700; color: #000; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="hero">
    <h1>MARMARA GAMES™</h1>
    
    <div id="auth-section">
        <p>Lisans sunusunu izlemek için giriş yapın:</p>
        <button class="btn" onclick="googleLogin()">GOOGLE İLE GİRİŞ YAP</button>
    </div>

    <div id="video-section">
        <h2>LİSANS SUNUSU</h2>
        <video width="800" controls>
            <source src="LICENSE.mp4" type="video/mp4">
        </video>
    </div>
</div>

</body>
</html>
